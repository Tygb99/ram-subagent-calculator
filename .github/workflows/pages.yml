name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - run: |
          mkdir _site
          cp index.html app.css styles.css results.css app.js calculator.mjs github-stats.mjs showcase.html showcase.css showcase.js .nojekyll _site/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
