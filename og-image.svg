<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AgentFit RAM 기반 서브에이전트 계산기</title>
  <desc id="desc">안전 동시 실행 수와 실측 기반 극한 누적 수를 구분하는 AgentFit 공유 이미지</desc>
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#171717" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#fafafa"/>
  <path d="M0 84H1200M0 546H1200" stroke="#171717" stroke-opacity="0.08"/>
  <path d="M640 0V630" stroke="#171717" stroke-opacity="0.05"/>

  <g transform="translate(64 52)">
    <rect width="40" height="40" rx="9" fill="#171717"/>
    <path fill="#fff" fill-rule="evenodd" d="m9.5 30 7.6-20h5.8l7.6 20H25l-1.3-4h-7.4L15 30H9.5Zm8.4-9.1h4.2L20 14.5l-2.1 6.4Z"/>
    <text x="56" y="27" fill="#171717" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="650" letter-spacing="-0.5">AgentFit</text>
  </g>

  <g transform="translate(64 156)">
    <text fill="#52525b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600" letter-spacing="1.4">RAM-AWARE CONCURRENCY</text>
    <text y="76" fill="#171717" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="58" font-weight="650" letter-spacing="-3.2">
      <tspan x="0" dy="0">RAM에 맞는</tspan>
      <tspan x="0" dy="66">서브에이전트 수.</tspan>
    </text>
    <text y="236" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="24" font-weight="400" letter-spacing="-0.5">
      <tspan x="0" dy="0">안전 동시 실행과 극한 누적값을</tspan>
      <tspan x="0" dy="36">분리해서 계산합니다.</tspan>
    </text>
  </g>

  <text x="64" y="582" fill="#52525b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="500">tygb99.github.io/ram-subagent-calculator</text>

  <g transform="translate(716 64)" filter="url(#panelShadow)">
    <rect width="420" height="502" rx="12" fill="#fff" stroke="#171717" stroke-opacity="0.10"/>

    <text x="36" y="52" fill="#52525b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" letter-spacing="1">24 GB / 결과</text>
    <rect x="274" y="27" width="110" height="34" rx="17" fill="#eff6ff"/>
    <text x="329" y="49" text-anchor="middle" fill="#2563eb" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="14" font-weight="650">균형 · 2 GB</text>

    <text x="36" y="108" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="18" font-weight="600">안전 동시 실행</text>
    <text x="34" y="225" fill="#171717" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="116" font-weight="650" letter-spacing="-8">6</text>
    <text x="116" y="214" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="22" font-weight="500">서브에이전트</text>

    <g transform="translate(36 252)">
      <rect width="108" height="74" rx="10" fill="#f4f4f5"/>
      <text x="16" y="26" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="14">안전</text>
      <text x="16" y="57" fill="#171717" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="650">5</text>

      <rect x="120" width="108" height="74" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-opacity="0.34"/>
      <text x="136" y="26" fill="#2563eb" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="14" font-weight="600">균형</text>
      <text x="136" y="57" fill="#171717" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="650">6</text>

      <rect x="240" width="108" height="74" rx="10" fill="#f4f4f5"/>
      <text x="256" y="26" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="14">최대</text>
      <text x="256" y="57" fill="#171717" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="650">8</text>
    </g>

    <g transform="translate(36 352)">
      <rect width="348" height="114" rx="12" fill="#eff6ff"/>
      <text x="20" y="30" fill="#2563eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="650" letter-spacing="0.7">실측 기반 극한 누적</text>
      <text x="20" y="70" fill="#171717" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="18" font-weight="600">논리 서브에이전트</text>
      <text x="326" y="80" text-anchor="end" fill="#171717" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="50" font-weight="650" letter-spacing="-2">160</text>
      <text x="326" y="99" text-anchor="end" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif" font-size="13">누적값 · 동시 실행 아님</text>
    </g>
